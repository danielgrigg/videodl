name: Refresh yt-dlp

# Weekly: bump yt-dlp to its latest release in uv.lock, then rebuild and publish
# the image. The Dockerfile installs deps with `uv sync --frozen`, so the image
# is reproducible and only changes when the lockfile changes — that's why we bump
# the pin here rather than relying on a plain rebuild. Steps after the bump only
# run when the lockfile actually changed, so most weekly runs are cheap no-ops.

on:
  schedule:
    - cron: "23 6 * * 1" # Mondays 06:23 UTC
  workflow_dispatch: # allow manual runs (e.g. to grab an urgent extractor fix)

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the lockfile bump
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.13"
          enable-cache: true

      - name: Bump yt-dlp in the lockfile
        id: bump
        run: |
          uv lock --upgrade-package yt-dlp
          if git diff --quiet uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "yt-dlp already at the latest release; nothing to do."
          else
            ver=$(grep -A1 'name = "yt-dlp"' uv.lock | awk -F'"' '/version =/ {print $2; exit}')
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "ytdlp=$ver" >> "$GITHUB_OUTPUT"
            echo "Bumped yt-dlp to $ver"
          fi

      - name: Commit the bump
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump yt-dlp to ${{ steps.bump.outputs.ytdlp }}"
          git push

      - name: Set up QEMU
        if: steps.bump.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.bump.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      # Single-arch build we can load locally to smoke-test before publishing,
      # so a broken yt-dlp release never clobbers :latest.
      - name: Build for smoke test (amd64)
        if: steps.bump.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: videodl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image boots
        if: steps.bump.outputs.changed == 'true'
        run: |
          docker run -d --name videodl -e VIDEO_DIR=/data/videos -p 8080:8080 videodl:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              echo "app is up"; exit 0
            fi
            sleep 1
          done
          echo "app did not become healthy"; docker logs videodl; exit 1

      - name: Log in to GHCR
        if: steps.bump.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: steps.bump.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (multi-arch)
        if: steps.bump.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
