name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.13"
          enable-cache: true

      - name: Sync dependencies (frozen)
        run: uv sync --frozen

      - name: mypy --strict
        run: uv run mypy app

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: videodl:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image boots
        run: |
          docker run -d --name videodl -e VIDEO_DIR=/data/videos -p 8080:8080 videodl:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ >/dev/null; then
              echo "app is up"; exit 0
            fi
            sleep 1
          done
          echo "app did not become healthy"; docker logs videodl; exit 1
